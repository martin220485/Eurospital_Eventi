services:
  backend:
    build: ./backend
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - eventi

  frontend:
    build: ./frontend
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - eventi

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${PROXY_HOST_PORT:-8080}:8080"
    depends_on:
      - frontend
      - backend
    networks:
      - eventi

  mysql:
    image: mysql:8
    profiles: ["dev"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eventi_dev
      MYSQL_USER: eventi
      MYSQL_PASSWORD: eventi
    command: ["--mysql-native-password=ON"]
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - eventi

networks:
  eventi:
    driver: bridge

volumes:
  mysql_dev_data:
